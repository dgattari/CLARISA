
# configs/train_classifier.yaml

random_seed: 42

# data
use_precomputed_split: true
split_dir: "/scratch/jsanchoz/MARTA/experiments/data_splits/marta_split_v1"

# input
input_mode: stack # small ROI (local context), larger ROI (more context) or 'stack' that combines both
fusion: dual # 'dual': two parallel streams (recommended) or 'stack6': 6-channel input (simpler, less standard)
resize_to: 384

# training
batch_size: 16
num_workers: 1 
stage1_epochs: 5 # training phases (frozen → partial → full)
stage2_epochs: 5
stage3_epochs: 10
k_unf: 2 # number of backbone blocks unfrozen in stage 2
 
# optimization
head_lr: 0.001
last_lr: 0.0003
rest_lr: 0.0001
weight_decay: 0.0001
class1_bonus: 1.1
decision_threshold: 0.5

# model
head_kind: mlp # mlp or logreg
hidden: 128 # size of hidden layer (MLP only)
dropout: 0.5 # dropout probability (MLP only)

# optional expert tracking
expert_mode: false
expert_config_path: "/scratch/jsanchoz/MARTA/configs/expert/wandb.yaml"

  # Caso 1: expert_mode = false
  # No se usa W&B.
  # El entrenamiento funciona exactamente igual que ahora.

  # Caso 2: expert_mode = true y hay W&B instalado
  # tracking with W&B:
    # - se inicializa una sesion de wandb,
    # - registra config,
    # - grafica métricas por fase,
    # - muestra gradientes/pesos,
    # - guarda checkpoints y artefactos finales.
