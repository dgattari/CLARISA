
# configs/expert/wandb.yaml

wandb:
  enabled: true
  project: "MARTA-training"
  entity: null
  mode: "online"         # online | offline | disabled
  tags: ["marta", "classifier"]
  group: null
  job_type: "train"
  name: null
  notes: null

  watch:
    enabled: true
    log: "all"           # gradients | parameters | all
    log_freq: 100

  log_artifacts: true
  save_model_artifact: true

  epoch_logging:
    enabled: true

  batch_logging:
    enabled: false
    log_every_steps: 20