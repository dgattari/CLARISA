
# configs/inference.yaml

# - threshold
# - perplexity
# - sigma
# - soft/hard heatmap

resize_to: 384
threshold: 0.50      # minimum confidence to assign class 0 or 1
expand: 40           # bbox expansion before centering ROI window

perplexity: 30.0     # t-SNE perplexity
soft: false          # use soft gaussian-smoothed heatmap
sigma: 128.0         # gaussian sigma for soft heatmap

save_excel: true
