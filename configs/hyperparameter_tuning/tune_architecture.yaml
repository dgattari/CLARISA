
# configs/hyper_tuning/tune_architecture.yaml
# cual es la mejor variante estructural base de MARTA? 

# DECIDIR ESTO CON DANI!!! Y TB QUE EL SPLITTING TIENE QUE SER PENSADO Y COHERENTE
study_name: "marta_architecture_search"
search_mode: "architecture"
direction: "minimize"

storage_path: "experiments/marta_optuna/architecture/optuna.db"
output_root: "experiments/marta_optuna/architecture"
base_train_config: "configs/train_classifier.yaml"

n_trials: 20
timeout_minutes: null
random_seed: 42

pruning:
  enabled: false # here we have a reduced search space, not needed
  n_startup_trials: 0
  n_warmup_steps: 0
  interval_steps: 1

# quizá incluso no usar Optuna “inteligente” al principio, sino un barrido pequeño pero completo y controlado

fixed: # aqui seria usar unos parametros coherentes con los que poder comparar diferentes architecturas.
  random_seed: 42
  resize_to: 384
  batch_size: 16
  num_workers: 1

  stage1_epochs: 5
  stage2_epochs: 5
  stage3_epochs: 10
  k_unf: 1

  head_lr: 0.001
  last_lr: 0.0003
  rest_lr: 0.0001
  weight_decay: 0.0001
  class1_bonus: 1.1
  decision_threshold: 0.5

search_space:
  input_mode_choices: ["256", "384", "stack"]
  fusion_for_stack_choices: ["dual", "stack6"] 
  head_kind_choices: ["mlp", "logreg"]
  hidden_choices: [64, 128, 256]
  dropout_choices: [0.3, 0.5]